version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      ML_INFERENCE_URL: http://ml-inference:8000/infer
      DASHBOARD_BIND: "0.0.0.0"
    ports:
      - "9090:9090"
      - "4001:4001"
      - "4002:4002"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-net
    restart: unless-stopped

  ml-inference:
    build:
      context: ./ml_bot
      dockerfile: Dockerfile
    container_name: ml-inference
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./ml_bot/models:/app/models:ro
    networks:
      - trading-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - trading-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    depends_on:
      - bot
      - ml-inference
    networks:
      - trading-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trading-net
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  trading-net:
    driver: bridge
