services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pnl-dashboard/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./pnl-dashboard/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/trading.json
    volumes:
      - grafanadata:/var/lib/grafana
      - ./pnl-dashboard/grafana/provisioning:/etc/grafana/provisioning
      - ./pnl-dashboard/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  api:
    build:
      context: ./pnl-dashboard
      dockerfile: api/Dockerfile
    ports:
      - "8001:8001"
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/bot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  promdata:
  grafanadata:
