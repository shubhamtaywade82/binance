services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  gateway:
    build:
      context: .
      dockerfile: packages/gateway/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "4100"
      GATEWAY_CORS_ORIGIN: "*"
    depends_on:
      - redis
    ports:
      - "4100:4100"
    restart: unless-stopped

  adapter-binance:
    build:
      context: .
      dockerfile: packages/adapter-binance/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      BINANCE_PRODUCT: ${BINANCE_PRODUCT:-usdm}
    depends_on:
      - redis
    restart: unless-stopped

  adapter-dhanhq:
    build:
      context: .
      dockerfile: packages/adapter-dhanhq/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DHAN_CLIENT_ID: ${DHAN_CLIENT_ID}
      DHAN_ACCESS_TOKEN: ${DHAN_ACCESS_TOKEN}
      DHAN_FEED_MODE: ${DHAN_FEED_MODE:-full}
    depends_on:
      - redis
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    depends_on:
      - gateway
    ports:
      - "5174:80"
    restart: unless-stopped
